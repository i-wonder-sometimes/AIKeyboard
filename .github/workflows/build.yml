Name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This adds a manual "Run workflow" button to your GitHub interface

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Upgraded to v4 to prevent deprecation blocks

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Upgraded to v4 to run on modern infrastructure
        with:
          java-version: '17' # Upgraded from 11 to prevent Android/Gradle compilation mismatches
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # Upgraded to v4 to fix your explicit error!
        with:
          name: AIKeyboard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
